name: Premium Channel Automation Pipeline

on:
  workflow_dispatch:

jobs:
  generate-hq-content:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install High Quality Video Render Modules
      run: |
        pip install requests gtts
        pip install "moviepy<2.0" Pillow==9.5.0

    - name: Run Premium Factory Engine
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
      run: |
        python generate_vids.py
