name: Google Vids Cookie Test

on:
  workflow_dispatch: # This adds a manual "Run workflow" button in GitHub!

jobs:
  run-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System and Playwright Dependencies
      run: |
        pip install playwright
        playwright install chromium

    - name: Execute Google Vids Login Test
      env:
        GOOGLE_SESSION_COOKIES: ${{ secrets.GOOGLE_SESSION_COOKIES }}
      run: |
        python generate_vids.py

    - name: Upload Workspace Screenshot Artifact
      if: always() # This forces GitHub to give you the screenshot even if the code errors out
      uses: actions/upload-artifact@v4
      with:
        name: vids-login-snapshot
        path: vids_canvas_snapshot.png
